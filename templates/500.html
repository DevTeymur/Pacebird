<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500 – Pacebird</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f7f8fa; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card { background:#fff; border-radius:20px; padding:56px 48px; text-align:center; max-width:400px; width:90%; box-shadow:0 8px 40px rgba(0,0,0,0.08); }
  .icon { font-size:56px; margin-bottom:20px; }
  h1 { font-size:22px; font-weight:800; color:#1a1a2e; margin-bottom:10px; }
  p { font-size:14px; color:#999; line-height:1.6; margin-bottom:32px; }
  .code { font-size:11px; font-weight:700; color:#fc4c02; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .btn { display:inline-block; background:#fc4c02; color:#fff; font-size:14px; font-weight:700; padding:13px 28px; border-radius:10px; text-decoration:none; }
  .btn:hover { background:#e04400; }
  .secondary { display:inline-block; margin-left:12px; font-size:13px; color:#aaa; text-decoration:none; }
  .secondary:hover { color:#fc4c02; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">⚠️</div>
  <div class="code">500</div>
  <h1>Something went wrong</h1>
  <p>An unexpected error occurred. If this keeps happening, try refreshing your data or reconnecting your Strava account.</p>
  <a href="/" class="btn">Go home</a>
  <a href="javascript:history.back()" class="secondary">← Go back</a>
</div>
</body>
</html>
